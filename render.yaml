databases:
  - name: smartbus-db
    databaseName: smartbus
    user: smartbus

services:
  - type: web
    name: smartbus-web
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput
    startCommand: gunicorn smartbus.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: smartbus-db
          property: connectionString
      - key: WEB_CONCURRENCY
        value: "2"
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@smartbus.local
      - key: DJANGO_SUPERUSER_PASSWORD
        generateValue: true
